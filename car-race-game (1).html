<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURBO DRIFT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Orbitron',sans-serif;
  overflow:hidden;
}
#wrap {
  position:relative;
  width:420px;
  height:620px;
}
canvas {
  display:block;
  border:2px solid #0ff;
  box-shadow:0 0 25px rgba(0,255,255,0.5), 0 0 60px rgba(0,255,255,0.2);
}
#hud {
  position:absolute;
  top:0; left:0; right:0;
  display:flex;
  justify-content:space-between;
  padding:10px 14px;
  pointer-events:none;
  z-index:5;
}
.hb { display:flex; flex-direction:column; gap:2px; }
.hl { font-size:8px; letter-spacing:3px; color:#0ff; opacity:.6; }
.hv { font-size:20px; font-weight:900; color:#fff; text-shadow:0 0 8px #0ff; }
#overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,10,0.92);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  z-index:20;
}
#overlay h1 {
  font-size:46px;
  font-weight:900;
  letter-spacing:5px;
  text-align:center;
  line-height:1.1;
  background:linear-gradient(135deg,#0ff,#f2f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px #0ff);
}
#overlay p {
  font-size:10px;
  letter-spacing:4px;
  color:rgba(255,255,255,0.4);
  text-align:center;
}
#finalScore {
  font-size:42px;
  font-weight:900;
  color:#fd0;
  text-shadow:0 0 20px #fd0;
  display:none;
}
#startBtn {
  margin-top:4px;
  padding:13px 38px;
  border:2px solid #0ff;
  background:transparent;
  color:#0ff;
  font-family:'Orbitron',sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:4px;
  cursor:pointer;
  transition:all .15s;
}
#startBtn:hover { background:#0ff; color:#000; box-shadow:0 0 30px #0ff; }
#lvlup {
  position:absolute;
  top:45%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:24px; font-weight:900;
  color:#fd0; text-shadow:0 0 20px #fd0;
  letter-spacing:3px;
  pointer-events:none;
  z-index:15;
  transition:transform .3s cubic-bezier(.2,.8,.3,1.4);
  white-space:nowrap;
}
#lvlup.on { transform:translate(-50%,-50%) scale(1); }
#hint {
  position:absolute;
  bottom:8px; left:0; right:0;
  text-align:center;
  font-size:9px;
  letter-spacing:2px;
  color:rgba(255,255,255,0.18);
  pointer-events:none;
  z-index:5;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="420" height="620"></canvas>

  <div id="hud">
    <div class="hb">
      <div class="hl">SCORE</div>
      <div class="hv" id="sEl">0</div>
    </div>
    <div class="hb" style="align-items:center">
      <div class="hl">LIVES</div>
      <div class="hv" id="lEl">&#9829;&#9829;&#9829;</div>
    </div>
    <div class="hb" style="align-items:flex-end">
      <div class="hl">LEVEL</div>
      <div class="hv" id="vEl">1</div>
    </div>
  </div>

  <div id="lvlup">&#9889; LEVEL UP &#9889;</div>

  <div id="overlay">
    <h1 id="ttl">TURBO<br>DRIFT</h1>
    <p id="sub">&#8212; STREET RACER &#8212;</p>
    <div id="finalScore">0</div>
    <button id="startBtn">START ENGINE</button>
    <p>ARROW KEYS or A / D to steer</p>
  </div>

  <div id="hint">DODGE TRAFFIC &nbsp;|&nbsp; SURVIVE &nbsp;|&nbsp; SCORE</div>
</div>

<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx    = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;

  var overlay  = document.getElementById('overlay');
  var startBtn = document.getElementById('startBtn');
  var sEl      = document.getElementById('sEl');
  var lEl      = document.getElementById('lEl');
  var vEl      = document.getElementById('vEl');
  var fsEl     = document.getElementById('finalScore');
  var ttlEl    = document.getElementById('ttl');
  var subEl    = document.getElementById('sub');
  var lvlupEl  = document.getElementById('lvlup');

  // Road
  var RL=105, RR=315;
  var RW=RR-RL;
  var LW=RW/3;
  var LANES=[RL+LW*0.5, RL+LW*1.5, RL+LW*2.5];
  var COLORS=['#ff3a5c','#ff9500','#4cd964','#bf5af2','#ff6b6b','#5ac8fa'];

  // Game vars
  var gs='menu', score=0, lives=3, level=1, frame=0;
  var speed=4.5, rOff=0;
  var enemies=[], parts=[];
  var eTimer=0, lvlTimer=0;
  // Unified car size — player matches standard enemy so lane-line exploit is impossible
  var CAR_W=34, CAR_H=60;
  var Px=W/2, Py=H-120, Pw=CAR_W, Ph=CAR_H, Pinv=0;

  // Stars
  var STARS=[];
  for(var i=0;i<55;i++){
    STARS.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.3,s:Math.random()*0.4+0.1});
  }

  // Input
  var K={};
  window.addEventListener('keydown',function(e){
    K[e.key]=true;
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].indexOf(e.key)>=0) e.preventDefault();
  });
  window.addEventListener('keyup',function(e){ K[e.key]=false; });

  // Touch
  var tx0=null;
  canvas.addEventListener('touchstart',function(e){ tx0=e.touches[0].clientX; e.preventDefault(); },{passive:false});
  canvas.addEventListener('touchmove',function(e){
    if(tx0===null) return;
    var d=e.touches[0].clientX-tx0;
    K['ArrowLeft']=d<-8; K['ArrowRight']=d>8;
    e.preventDefault();
  },{passive:false});
  canvas.addEventListener('touchend',function(){ K['ArrowLeft']=K['ArrowRight']=false; tx0=null; });

  function rrect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  function burst(x,y,col,n){
    for(var i=0;i<n;i++){
      var a=Math.random()*Math.PI*2, sp=2+Math.random()*4;
      parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:col,sz:2+Math.random()*5});
    }
  }

  function updateHUD(){
    sEl.textContent=score;
    vEl.textContent=level;
    var hearts='';
    for(var i=0;i<Math.max(0,lives);i++) hearts+='♥';
    lEl.textContent=hearts;
  }

  function reset(){
    score=0; lives=3; level=1; frame=0;
    speed=4.5; rOff=0;
    enemies=[]; parts=[]; eTimer=0; lvlTimer=0;
    Px=W/2; Py=H-120; Pinv=0;
    updateHUD();
  }

  function drawCar(cx,cy,w,h,col,isP){
    ctx.save();
    ctx.translate(cx,cy);
    if(isP && Pinv>0 && (Math.floor(Pinv/5)%2)===0) ctx.globalAlpha=0.25;

    // shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(2,h/2+5,w*0.48,6,0,0,Math.PI*2); ctx.fill();

    // body
    ctx.fillStyle=col;
    rrect(-w/2,-h/2,w,h,7); ctx.fill();

    // cabin
    ctx.fillStyle='rgba(0,0,0,0.22)';
    rrect(-w*0.3,-h/2+h*0.05,w*0.6,h*0.4,5); ctx.fill();

    // windshield
    ctx.fillStyle=isP?'rgba(0,255,255,0.55)':'rgba(180,220,255,0.38)';
    rrect(-w*0.25,-h/2+h*0.07,w*0.5,h*0.16,3); ctx.fill();

    // stripe
    ctx.fillStyle=isP?'#f2f':'rgba(255,255,255,0.15)';
    ctx.fillRect(-2,-h/2+4,4,h-8);

    // wheels
    var wx=w/2+4;
    var wpos=[[-wx,-h*0.27],[wx,-h*0.27],[-wx,h*0.27],[wx,h*0.27]];
    for(var i=0;i<wpos.length;i++){
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(wpos[i][0],wpos[i][1],4.5,7,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#444'; ctx.lineWidth=1.5; ctx.stroke();
    }

    // lights
    ctx.shadowBlur=0;
    if(isP){
      ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=14;
      ctx.fillRect(-w/2+3,-h/2-4,8,5); ctx.fillRect(w/2-11,-h/2-4,8,5);
      ctx.fillStyle='#f2f'; ctx.shadowColor='#f2f'; ctx.shadowBlur=10;
      ctx.fillRect(-w/2+3,h/2,8,5); ctx.fillRect(w/2-11,h/2,8,5);
    } else {
      ctx.fillStyle='#f55'; ctx.shadowColor='#f00'; ctx.shadowBlur=8;
      ctx.fillRect(-w/2+3,h/2,7,4); ctx.fillRect(w/2-10,h/2,7,4);
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }

  function drawBg(){
    ctx.fillStyle='#03030e'; ctx.fillRect(0,0,W,H);

    // stars
    for(var i=0;i<STARS.length;i++){
      var s=STARS[i];
      s.y+=s.s; if(s.y>H){s.y=0;s.x=Math.random()*W;}
      ctx.globalAlpha=0.25+Math.sin(frame*0.05+s.x)*0.15;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // grass
    ctx.fillStyle='#091a0f'; ctx.fillRect(0,0,RL,H); ctx.fillRect(RR,0,W-RR,H);

    // road
    ctx.fillStyle='#0c0c1c'; ctx.fillRect(RL,0,RW,H);

    // edges glow
    ctx.strokeStyle='rgba(0,255,255,0.75)'; ctx.lineWidth=2;
    ctx.shadowColor='#0ff'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(RL,0); ctx.lineTo(RL,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(RR,0); ctx.lineTo(RR,H); ctx.stroke();
    ctx.shadowBlur=0;

    // lane dashes
    rOff=(rOff+speed)%80;
    for(var i=1;i<3;i++){
      var lx=RL+i*LW;
      ctx.setLineDash([36,44]); ctx.lineDashOffset=-rOff;
      ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
    }
    ctx.setLineDash([]); ctx.lineDashOffset=0;
  }

  function drawParticles(){
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      if(p.life<=0) continue;
      ctx.globalAlpha=p.life;
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.1,p.sz*p.life),0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  function update(){
    frame++;
    if(gs!=='playing') return;

    // move
    var mv=5+Math.min(level*0.3,3);
    if((K['ArrowLeft']||K['a']||K['A'])&&Px-Pw/2>RL+4) Px-=mv;
    if((K['ArrowRight']||K['d']||K['D'])&&Px+Pw/2<RR-4) Px+=mv;

    // score
    score++;
    if(frame%5===0) updateHUD();

    // level
    var nl=Math.floor(score/600)+1;
    if(nl>level){
      level=nl; speed=4.5+(level-1)*0.85;
      updateHUD();
      lvlupEl.classList.add('on');
      lvlTimer=90;
    }
    if(lvlTimer>0){ lvlTimer--; if(lvlTimer===0) lvlupEl.classList.remove('on'); }

    // spawn enemy
    var interval=Math.max(32,95-level*8);
    eTimer++;
    if(eTimer>=interval){
      var lane=Math.floor(Math.random()*3);
      var big=Math.random()<0.25;
      var ew=big?42:CAR_W, eh=big?80:CAR_H;
      var ec=COLORS[Math.floor(Math.random()*COLORS.length)];
      var espd=speed*(0.7+Math.random()*0.55);
      enemies.push({x:LANES[lane],y:-eh-10,w:ew,h:eh,col:ec,spd:espd});
      eTimer=0;
    }

    // update enemies
    for(var i=enemies.length-1;i>=0;i--){
      var e=enemies[i];
      e.y+=e.spd;
      if(e.y>H+80){ enemies.splice(i,1); continue; }
      if(Pinv<=0){
        var dx=Math.abs(Px-e.x), dy=Math.abs(Py-e.y);
        if(dx<(Pw+e.w)*0.5 && dy<(Ph+e.h)*0.5){
          lives--;
          Pinv=100;
          burst(Px,Py,'#f2f',20);
          burst(e.x,e.y,e.col,14);
          enemies.splice(i,1);
          updateHUD();
          if(lives<=0){ gs='over'; setTimeout(gameOver,550); }
        }
      }
    }

    if(Pinv>0) Pinv--;

    // exhaust
    if(frame%4===0){
      burst(Px-10,Py+Ph/2+2,'rgba(0,220,255,0.8)',1);
      burst(Px+10,Py+Ph/2+2,'rgba(0,220,255,0.8)',1);
    }

    // update particles
    var alive=[];
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93; p.life-=0.025;
      if(p.life>0) alive.push(p);
    }
    parts=alive;
  }

  function render(){
    drawBg();

    // speed lines
    if(gs==='playing'&&speed>6){
      var a=Math.min((speed-6)/8,0.2);
      ctx.strokeStyle='rgba(0,255,255,'+a+')'; ctx.lineWidth=1;
      for(var i=0;i<5;i++){
        var lx=RL+10+Math.random()*RW, ly=Math.random()*H;
        ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx,ly+35+Math.random()*30); ctx.stroke();
      }
    }

    for(var i=0;i<enemies.length;i++){
      var e=enemies[i];
      drawCar(e.x,e.y,e.w,e.h,e.col,false);
    }
    if(gs==='playing'||gs==='over') drawCar(Px,Py,Pw,Ph,'#0ff',true);
    drawParticles();
  }

  function gameOver(){
    ttlEl.textContent='GAME OVER';
    subEl.textContent='FINAL SCORE';
    fsEl.textContent=score;
    fsEl.style.display='block';
    startBtn.textContent='RACE AGAIN';
    overlay.style.display='flex';
  }

  startBtn.addEventListener('click',function(){
    reset();
    gs='playing';
    overlay.style.display='none';
    ttlEl.innerHTML='TURBO<br>DRIFT';
    subEl.textContent='&#8212; STREET RACER &#8212;';
    fsEl.style.display='none';
    startBtn.textContent='START ENGINE';
    lvlupEl.classList.remove('on');
  });

  function loop(){
    update();
    render();
    requestAnimationFrame(loop);
  }

  gs='menu';
  loop();
})();
</script>
</body>
</html>
